name: Publish Devloop Helm Chart

# Packages and publishes the devloop Helm chart as an OCI artifact to
# ghcr.io/omneval/charts/devloop on semver tags.

on:
  push:
    tags: ['v*']
  pull_request:

concurrency:
  group: publish-chart-${{ github.ref }}
  cancel-in-progress: false

jobs:
  package_and_push:
    name: Package and push chart to GHCR
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'pull_request' ||
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v'))
    permissions:
      packages: write
      contents: read
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.0

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Package chart
        run: |
          helm package charts/devloop/ -u -d .cr-release-packages
          echo "chart=$(ls .cr-release-packages/devloop-*.tgz)" >> "$GITHUB_OUTPUT"
        id: package

      - name: Lint chart
        run: helm lint ${{ steps.package.outputs.chart }}

      - name: Push chart to GHCR
        if: github.event_name != 'pull_request'
        run: |
          helm push ${{ steps.package.outputs.chart }} oci://ghcr.io/omneval/charts
