# Temporal dev infrastructure for local quickstart (issue #116).
#
# Usage:
#   docker compose up -d
#
# This starts a Temporal server on localhost:7233 and the Temporal Web UI
# on localhost:8233.  It replaces the need for the Temporal CLI
# (`temporal server start-dev`) in the local quickstart guide.

services:
  temporal:
    image: temporalio/auto-setup:1.22.0
    ports:
      - "7233:7233"
    environment:
      - CASSANDRA_SEEDS=cassandra

  cassandra:
    image: cassandra:3.11
    logging:
      driver: none

  temporal-web:
    image: temporalio/web:1.13.0
    ports:
      - "8233:8080"
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
    depends_on:
      - temporal
